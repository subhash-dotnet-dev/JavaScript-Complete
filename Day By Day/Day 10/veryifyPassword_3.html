<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Password</title>
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <style>
        /* Progress bar ki height aur spacing */
        progress {
            height: 25px;
            width: 100%;
            margin-top: 10px;
            display: none; /* Default hidden */
        }
        .status-msg {
            display: block;
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
    <script>
        function VerifyPassword() {
            // Regex: At least one Uppercase, total length 4-10
            var regExp = /(?=.*[A-Z])\w{4,10}/;
            var txtPwd = document.getElementById("txtPwd").value;
            var lblMsg = document.getElementById("lblMsg");
            var grade = document.getElementById("grade");

            // Agar input khali hai toh sab hide kar dein
            if (txtPwd.length === 0) {
                grade.style.display = "none";
                lblMsg.innerHTML = "";
                return;
            }

            grade.style.display = "block";

            function UpdateStatus(val, text, color) {
                grade.value = val;
                lblMsg.innerHTML = text;
                lblMsg.style.color = color;
            }

            if (txtPwd.match(regExp)) {
                // Strong Password Logic
                UpdateStatus(100, "Strong Password", "green");
            } else {
                if (txtPwd.length < 4) {
                    // Poor Password Logic
                    UpdateStatus(20, "Poor Password", "red");
                    lblMsg.style.fontStyle = "italic";
                } else {
                    // Weak Password Logic
                    UpdateStatus(60, "Weak Password (Need Uppercase)", "orange");
                    lblMsg.style.fontStyle = "italic";
                }
            }
        }
    </script>
</head>
<body class="container-fluid">
    <div class="row mt-4">
        <div class="col-md-4">
            <h2>Regular Expression</h2>
            <div class="form-group">
                <label for="txtPwd">Password</label>
                <div>
                    <input onkeyup="VerifyPassword()" id="txtPwd" type="password"
                           class="form-control" placeholder="Enter password">
                    <div>
                        <progress min="1" max="100" id="grade"></progress>
                        <span id="lblMsg" class="status-msg"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
