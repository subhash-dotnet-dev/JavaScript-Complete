<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Password</title>
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">

    <style>
        /* CSS ko yahan likhne se 'Inline styles' wali warning hat jayegi */
        #grade {
            display: none;
            height: 20px;
            width: 100%;
            margin-top: 10px;
        }
        .status-text {
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }
    </style>

    <script>
        function VerifyPassword(){
            var regExp = /(?=.*[A-Z])\w{4,10}/;
            var txtPwd = document.getElementById("txtPwd").value;
            var lblMsg = document.getElementById("lblMsg");
            var grade = document.getElementById("grade");

            if(txtPwd.length === 0) {
                grade.style.display = "none";
                lblMsg.innerHTML = "";
                return;
            }

            grade.style.display = "block";

            function GradeDisplay(value, colorClass){
                grade.value = value;
                lblMsg.className = "status-text " + colorClass;
            }

            if(txtPwd.match(regExp)){
                lblMsg.innerHTML = "Strong Password";
                GradeDisplay(100, "text-success");
            } else {
                if(txtPwd.length < 4) {
                    lblMsg.innerHTML = "Poor Password";
                    GradeDisplay(20, "text-danger");
                } else {
                    lblMsg.innerHTML = "Weak Password";
                    GradeDisplay(60, "text-warning");
                }
            }
        }
    </script>
</head>
<body class="container-fluid">
    <div class="row mt-4">
        <div class="col-md-4">
            <h2>Regular Expression</h2>
            <div class="form-group">
                <label for="txtPwd">Password</label>
                <div>
                    <input onkeyup="VerifyPassword()" id="txtPwd" type="password"
                           class="form-control" placeholder="Enter password">
                    <div>
                        <progress min="1" max="100" id="grade"></progress>
                        <span id="lblMsg"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
