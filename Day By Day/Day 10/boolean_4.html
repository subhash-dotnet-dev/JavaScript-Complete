<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFC Order Form</title>

    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        /* Inline styles ko internal style block mein move kiya taaki warning na aaye */
        body {
            background-color: darkred;
            color: white;
        }
        section {
            margin-top: 20px;
            padding: 0 5%;
        }
        .card {
            color: black;
            margin-bottom: 10px;
        }
        .header-banner {
            height: 150px;
            width: 100%;
            object-fit: cover;
        }
        .food-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 5px;
        }
        .modal-body {
            color: black;
        }
    </style>

    <script>
        function OrderClick(){
            // Labels aur Inputs ko access karna
            document.getElementById("lblName").innerHTML = document.getElementById("txtName").value;
            document.getElementById("lblMobile").innerHTML = document.getElementById("txtMobile").value;

            var mealName = "";
            var mealCost = 0;
            var adonName = "";

            var optBurger = document.getElementById("optBurger");
            var optRoller = document.getElementById("optRoller");

            if(optBurger.checked) {
                mealCost = 130;
                mealName = optBurger.value;
            } else if(optRoller.checked) {
                mealCost = 100;
                mealName = optRoller.value;
            }

            var optFries = document.getElementById("optFries");
            var optKrusher = document.getElementById("optKrusher");

            if(optFries.checked) {
                mealCost += 80;
                adonName += optFries.value + "<br>";
            }
            if(optKrusher.checked) {
                mealCost += 40;
                adonName += optKrusher.value + "<br>";
            }

            document.getElementById("lblMeal").innerHTML = mealName || "No meal selected";
            document.getElementById("lblAdon").innerHTML = adonName || "None";
            document.getElementById("lblTotal").innerHTML = "&#8377; " + mealCost;
        }
    </script>
</head>
<body class="container-fluid">
    <header class="mt-2">
        <img src="../../src/assets/images/flower_blue.jpg" class="header-banner img-fluid" alt="KFC Promotion Banner">
    </header>

    <section>
        <div class="accordion" id="orderForm">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-danger text-white fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#customerInfo">
                        <i class="bi bi-person-fill me-2"></i> 1. Customer Info
                    </button>
                </h2>
                <div id="customerInfo" class="accordion-collapse collapse show" data-bs-parent="#orderForm">
                    <div class="accordion-body text-dark">
                        <div class="mb-3">
                            <label for="txtName" class="form-label">Customer Name</label>
                            <input type="text" id="txtName" class="form-control" placeholder="Enter Name">
                        </div>
                        <div class="mb-3">
                            <label for="txtMobile" class="form-label">Mobile Number</label>
                            <input type="text" id="txtMobile" class="form-control" placeholder="Enter Mobile">
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion-item mt-2">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed bg-danger text-white fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#mealInfo">
                        <i class="bi bi-egg-fried me-2"></i> 2. Select Meal
                    </button>
                </h2>
                <div id="mealInfo" class="accordion-collapse collapse" data-bs-parent="#orderForm">
                    <div class="accordion-body">
                        <div class="row">
                            <div class="col-6">
                                <div class="card text-center shadow-sm">
                                    <div class="card-header"><h5>OMG Burger</h5></div>
                                    <div class="card-body">
                                        <img src="../../src/assets/images/omg burger.jpg" class="food-img" alt="OMG Burger">
                                    </div>
                                    <div class="card-footer">
                                        <div class="form-check d-flex justify-content-center">
                                            <input class="form-check-input" name="meal" id="optBurger" value="OMG Burger" type="radio">
                                            <label class="form-check-label ms-2" for="optBurger"> &#8377; 130/-</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="card text-center shadow-sm">
                                    <div class="card-header"><h5>OMG Roller</h5></div>
                                    <div class="card-body">
                                        <img src="../../src/assets/images/omg roller burger.jpg" class="food-img" alt="OMG Roller">
                                    </div>
                                    <div class="card-footer">
                                        <div class="form-check d-flex justify-content-center">
                                            <input class="form-check-input" name="meal" id="optRoller" value="OMG Roller" type="radio">
                                            <label class="form-check-label ms-2" for="optRoller"> &#8377; 100/-</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion-item mt-2">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed bg-danger text-white fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#adonInfo">
                        <i class="bi bi-plus-circle-fill me-2"></i> 3. Select Ad-ON
                    </button>
                </h2>
                <div id="adonInfo" class="accordion-collapse collapse" data-bs-parent="#orderForm">
                    <div class="accordion-body">
                        <div class="row mb-3">
                            <div class="col-6">
                                <div class="card text-center shadow-sm">
                                    <div class="card-header"><h5>Large Fries</h5></div>
                                    <div class="card-body">
                                        <img src="../../src/assets/images/large fries burger.jpg" class="food-img" alt="Large Fries">
                                    </div>
                                    <div class="card-footer">
                                        <div class="form-check d-flex justify-content-center">
                                            <input class="form-check-input" id="optFries" value="Large Fries" type="checkbox">
                                            <label class="form-check-label ms-2" for="optFries"> &#8377; 80/-</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="card text-center shadow-sm">
                                    <div class="card-header"><h5>Krusher Brownie</h5></div>
                                    <div class="card-body">
                                        <img src="../../src/assets/images/Krusher Brownie burger.jpg" class="food-img" alt="Krusher Brownie">
                                    </div>
                                    <div class="card-footer">
                                        <div class="form-check d-flex justify-content-center">
                                            <input class="form-check-input" type="checkbox" id="optKrusher" value="Krusher Brownie">
                                            <label class="form-check-label ms-2" for="optKrusher"> &#8377; 40/-</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button onclick="OrderClick()" data-bs-target="#billSummary" data-bs-toggle="modal" class="btn btn-warning w-100 fw-bold">
                            PLACE ORDER
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="billSummary" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content text-dark">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Order Summary</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <table class="table table-bordered">
                        <tr><td>Customer</td><td id="lblName"></td></tr>
                        <tr><td>Mobile</td><td id="lblMobile"></td></tr>
                        <tr><td>Meal</td><td id="lblMeal"></td></tr>
                        <tr><td>Ad-ONs</td><td id="lblAdon"></td></tr>
                        <tr class="table-danger fw-bold"><td>Total Amount</td><td id="lblTotal"></td></tr>
                    </table>
                </div>
                <div class="modal-footer">
                    <button data-bs-dismiss="modal" class="btn btn-success w-100">Confirm Order</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</body>
</html>
