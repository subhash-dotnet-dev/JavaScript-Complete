<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greeting Display | Professional</title>

    <link
      rel="stylesheet"
      href="../../../node_modules/bootstrap/dist/css/bootstrap.css"
    />
    <link
      rel="stylesheet"
      href="../../../node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />

    <style>
      /* Modern Glassmorphism Design */
      body {
        background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Roboto, sans-serif;
      }

      .glass-container {
        background: rgba(255, 255, 255, 0.05);
        /* Safari support fix */
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        padding: 40px;
        width: 460px;
        text-align: center;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
      }

      .status-icon {
        font-size: 4.5rem;
        margin-bottom: 10px;
        display: block;
      }

      .greeting-text {
        font-size: 2.2rem;
        font-weight: 800;
        color: white;
        letter-spacing: 1px;
      }

      #pic {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 25px;
        margin: 20px 0;
        border: 3px solid rgba(255, 255, 255, 0.1);
      }

      .digital-clock {
        background: rgba(0, 210, 255, 0.15);
        color: #00d2ff;
        padding: 10px 25px;
        border-radius: 50px;
        font-size: 1.2rem;
        font-weight: bold;
        display: inline-block;
        border: 1px solid rgba(0, 210, 255, 0.3);
      }
    </style>

    <script>
      function updateGreeting() {
        var now = new Date();
        var hrs = now.getHours();
        var pic = document.getElementById('pic');
        var msg = document.getElementById('msg');
        var icon = document.getElementById('icon');
        var timeDisplay = document.getElementById('timeDisplay');

        // Live Time Update
        timeDisplay.innerHTML = now.toLocaleTimeString();

        // Correct Path: Day 17 -> Day By Day -> Root -> src/assets/images
        var path = '../../../src/assets/images/';

        // Logic Fix: hrs >= 0 instead of 00
        if (hrs >= 0 && hrs < 12) {
          msg.innerHTML = 'Good Morning!';
          icon.className =
            'bi bi-brightness-alt-high-fill text-warning status-icon';
          pic.src = path + 'flower_blue.jpg';
        } else if (hrs >= 12 && hrs < 17) {
          msg.innerHTML = 'Good Afternoon!';
          icon.className = 'bi bi-sun-fill text-danger status-icon';
          pic.src = path + 'park_man.jpg';
        } else {
          msg.innerHTML = 'Good Evening!';
          icon.className = 'bi bi-moon-stars-fill text-info status-icon';
          pic.src = path + 'green_grass.jpg';
        }
      }

      // Update every second
      setInterval(updateGreeting, 1000);
    </script>
  </head>
  <body onload="updateGreeting()">
    <div class="glass-container">
      <i id="icon"></i>
      <div id="msg" class="greeting-text">Loading...</div>

      <img id="pic" alt="Greeting Image" />

      <div>
        <div class="digital-clock" id="timeDisplay">00:00:00</div>
      </div>
    </div>
  </body>
</html>
