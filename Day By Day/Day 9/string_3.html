<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>

    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">

    <script>
        function checkName() {
            var name = document.getElementById("txtName").value;
            var msg = document.getElementById("msg");

            if (name.length > 0) {
                var ch = name.charCodeAt(0);
                if (ch >= 65 && ch <= 90) {
                    msg.innerHTML = "";
                } else {
                    msg.innerHTML = "Start with capital letter";
                }
            }
        }

        function checkPassword() {
            var pwd = document.getElementById("txtPwd").value;
            var res = document.getElementById("pwdError");

            if (pwd.trim() === "john") {
                res.innerHTML = "ok";
            } else {
                res.innerHTML = "wrong password";
            }
        }

        function checkCard() {
            var card = document.getElementById("txtCard").value;
            var first = card.charAt(0);
            var img = document.getElementById("cardLogo");

            if (first === "4") {
                img.src = "../../src/assets/images/visa card.jpg";
            } else if (first === "5") {
                img.src = "../../src/assets/images/master card.jpg";
            } else {
                img.src = "../../src/assets/images/invalid card.jpg";
            }
        }

        function checkEmail() {
            var email = document.getElementById("txtEmail").value;
            var err = document.getElementById("emailError");

            var at = email.indexOf("@");
            var dot = email.lastIndexOf(".");

            if (at < 2 || (dot - at) < 2) {
                err.innerHTML = "invalid email";
            } else {
                err.innerHTML = "ok";
            }
        }
    </script>
</head>

<body class="container mt-4">

    <h3>Simple Form</h3>

    <!-- Name -->
    <div class="form-group">
        <label for="txtName">Name</label>
        <input
            type="text"
            id="txtName"
            class="form-control"
            placeholder="Enter name"
            title="Enter your name"
            aria-label="Name"
            required
            onblur="checkName()">
        <div id="msg" class="text-danger"></div>
    </div>

    <!-- Password -->
    <div class="form-group">
        <label for="txtPwd">Password</label>
        <input
            type="password"
            id="txtPwd"
            class="form-control"
            placeholder="Enter password"
            title="Enter password"
            aria-label="Password"
            required
            onblur="checkPassword()">
        <div id="pwdError" class="text-danger"></div>
    </div>

    <!-- Card -->
    <div class="form-group">
        <label for="txtCard">Card Number</label>
        <div class="input-group">
            <input
                type="text"
                id="txtCard"
                class="form-control"
                placeholder="Enter card number"
                title="Enter card number"
                aria-label="Card Number"
                required
                onkeyup="checkCard()">
            <div class="input-group-append">
                <span class="input-group-text">
                    <img id="cardLogo" width="50" height="20" alt="card logo">
                </span>
            </div>
        </div>
    </div>

    <!-- Email -->
    <div class="form-group">
        <label for="txtEmail">Email</label>
        <input
            type="email"
            id="txtEmail"
            class="form-control"
            placeholder="Enter email"
            title="Enter valid email"
            aria-label="Email"
            required
            onblur="checkEmail()">
        <div id="emailError" class="text-danger"></div>
    </div>

</body>
</html>
