<script>
  'use strict';
  var x = 10;
  let y = 20;
  const z = 30;
  function f1() {
    window.a = 40; //window refers to browser
    document.write(`f1 values: <br>
x=${x}<br>y=${y}<br>z=${z}<br>a=${a}<br>`);
  }
  function f2() {
    document.write(`f2 values: <br> x=${x}<br>y=${y}<br>z=${z}<br>a=${a}`);
  }
  f1();
  f2();
</script>
// In the above code, we are declaring a variable a without using var, let, or
const. This makes a a global variable that is attached to the window object in
the browser. As a result, we can access a in both f1 and f2 functions without
any issues.
