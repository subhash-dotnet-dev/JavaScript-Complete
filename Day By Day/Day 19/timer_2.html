<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Document</title>

    <style>
      .watch {
        display: grid;

        grid-template-columns: 3fr 3fr 3fr 3fr;

        width: 600px;

        padding: 20px;

        font-size: 50px;

        font-weight: bold;

        font-family: Arial;

        background-color: rgb(16, 140, 185);

        border-radius: 20px;
      }
    </style>

    <script>
      var ms = 0;

      var sec = 0;

      var min = 0;

      var hr = 0;

      function Watch() {
        ms++;

        if (ms == 999) {
          sec++;

          ms = 0;

          if (sec == 59) {
            min++;

            sec = 0;

            if (min == 59) {
              hr++;

              min = 0;
            }
          }
        }

        document.getElementById('lblMs').innerHTML = ms;

        document.getElementById('lblSec').innerHTML = sec;

        document.getElementById('lblMin').innerHTML = min;
      }

      var thread;

      function StartClick() {
        thread = setInterval(Watch, 1);
      }

      function StopClick() {
        clearInterval(thread);
      }
    </script>
  </head>

  <body>
    <div class="watch">
      <div>
        <span id="lblHr">00</span>
      </div>

      <div>
        <span id="lblMin">00</span>
      </div>

      <div>
        <span id="lblSec">00</span>
      </div>

      <div>
        <span id="lblMs">000</span>
      </div>
    </div>

    <br /><br />

    <button onclick="StartClick()">Start</button>

    <button onclick="StopClick()">Stop</button>
  </body>
</html>
