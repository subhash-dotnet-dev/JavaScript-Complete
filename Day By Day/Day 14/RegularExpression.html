<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regular Expression | Password Strength</title>
    <style>
      /* Progress bar styling */
      progress {
        height: 20px;
        width: 200px;
        margin-top: 10px;
        display: block;
      }
      #msg {
        font-weight: bold;
        margin-top: 5px;
        font-family: Arial, sans-serif;
      }
      fieldset {
        width: 300px;
        border-radius: 8px;
        padding: 20px;
      }
    </style>
    <script>
      function VerifyPassword() {
        // Standard quotes used here
        var txtPwd = document.getElementById('txtPwd').value;
        var msg = document.getElementById('msg');
        var grade = document.getElementById('grade');

        // RegExp: Kam se kam 1 Uppercase aur 4-10 characters long
        var regExp = /(?=.*[A-Z])\w{4,10}/;

        function ShowGrade(mn, mx, val) {
          grade.min = mn;
          grade.max = mx;
          grade.value = val;
        }

        // Logic check
        if (txtPwd.match(regExp)) {
          msg.innerHTML = 'Strong Password';
          msg.style.color = 'green';
          ShowGrade(1, 100, 100);
        } else {
          if (txtPwd.length < 4) {
            msg.innerHTML = 'Poor Password (Min 4 chars)';
            msg.style.color = 'red';
            ShowGrade(1, 100, 20);
          } else {
            msg.innerHTML = 'Weak Password (Need 1 Uppercase)';
            msg.style.color = 'orange';
            ShowGrade(1, 100, 70);
          }
        }

        // Agar input empty hai to reset karein
        if (txtPwd.length === 0) {
          msg.innerHTML = '';
          ShowGrade(1, 100, 0);
        }
      }
    </script>
  </head>
  <body>
    <fieldset>
      <legend>Password Security</legend>
      <div>
        <label for="txtPwd">Enter Password:</label>
        <input
          onkeyup="VerifyPassword()"
          id="txtPwd"
          type="password"
          class="form-control"
        />

        <div>
          <progress id="grade" min="0" value="0" max="100"></progress>
        </div>
        <div id="msg" role="status"></div>
      </div>
    </fieldset>
  </body>
</html>
