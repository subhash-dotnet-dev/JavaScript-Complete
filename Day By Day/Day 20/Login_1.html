<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern User Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text-main: #ffffff;
        --text-muted: #94a3b8;
        --error: #f87171;
        --success: #4ade80;
      }

      * {
        box-sizing: border-box;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top right, #1e293b, #0f172a);
        color: var(--text-main);
      }

      .login-container {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 24px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        animation: slideUp 0.6s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 28px;
        font-weight: 700;
      }

      p.subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 32px;
      }

      .input-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 12px;
        color: white;
        font-size: 16px;
        transition: all 0.3s ease;
        outline: none;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
      }

      button {
        width: 100%;
        padding: 16px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
      }

      button:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
      }

      #msg {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        font-weight: 500;
        min-height: 20px;
      }

      .error-text {
        color: var(--error);
      }
      .success-text {
        color: var(--success);
      }
    </style>
  </head>
  <body>
    <div class="login-container" id="loginBox">
      <h2>Welcome Back</h2>
      <p class="subtitle">Enter your details to sign in</p>

      <div class="input-group">
        <label>User Name</label>
        <input type="text" id="userName" placeholder="e.g. Subhash Yadav" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button onclick="LoginClick()">Sign In</button>

      <div id="msg"></div>
    </div>

    <script>
      function LoginClick() {
        const userName = document.getElementById('userName').value.trim();
        const password = document.getElementById('password').value.trim();
        const msg = document.getElementById('msg');
        const loginBox = document.getElementById('loginBox');

        if (!userName || !password) {
          msg.innerHTML = 'Please fill in all fields.';
          msg.className = 'error-text';
          return;
        }

        msg.innerHTML = 'Verifying...';
        msg.className = '';

        // Path ensures it looks for your JSON file
        fetch('/bootstrap-examples/data/user.json')
          .then((response) => {
            if (!response.ok) throw new Error('Could not load user data');
            return response.json();
          })
          .then((users) => {
            // Find user in the JSON array
            const user = users.find(
              (u) => u.userName === userName && u.password === password,
            );

            if (user) {
              // Success UI Change
              loginBox.innerHTML = `
                        <div style="text-align:center; padding: 20px 0;">
                            <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
                            <h2 style="color: var(--success);">Login Success!</h2>
                            <p style="color: var(--text-muted); margin-bottom: 30px;">Welcome, ${user.userName}</p>
                            <button onclick="location.reload()" style="background: #334155;">Logout</button>
                        </div>
                    `;
            } else {
              msg.innerHTML = 'Invalid User Name or Password!';
              msg.className = 'error-text';
            }
          })
          .catch((err) => {
            msg.innerHTML = 'System Error: Unable to fetch data.';
            msg.className = 'error-text';
            console.error(err);
          });
      }
    </script>
  </body>
</html>
