<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Insert | Product Registration</title>
    <link
      rel="stylesheet"
      href="../node_modules/bootstrap/dist/css/bootstrap.css"
    />

    <script>
      var data = [
        { Name: 'Samsung TV', Price: 45000.55 },
        { Name: 'Nike Casuals', Price: 4200.33 },
      ];

      function LoadTable() {
        var tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        for (var item of data) {
          var tr = document.createElement('tr');
          var tdName = document.createElement('td');
          var tdPrice = document.createElement('td');

          tdName.innerHTML = item.Name;
          // Price formatting with Currency Symbol
          tdPrice.innerHTML =
            '&#8377; ' + parseFloat(item.Price).toLocaleString('en-IN');

          tr.appendChild(tdName);
          tr.appendChild(tdPrice);
          tbody.appendChild(tr);
        }
      }

      function bodyload() {
        LoadTable();
      }

      function AddClick() {
        var txtName = document.getElementById('txtName');
        var txtPrice = document.getElementById('txtPrice');

        // Input validation check
        if (txtName.value === '' || txtPrice.value === '') {
          alert('Please enter both Name and Price');
          return;
        }

        var newObject = {
          Name: txtName.value,
          Price: txtPrice.value,
        };

        data.push(newObject);
        alert('Record Added Successfully!');

        // Input fields clear karna
        txtName.value = '';
        txtPrice.value = '';

        LoadTable();
      }
    </script>
  </head>
  <body onload="bodyload()" class="container-fluid p-4">
    <div class="row">
      <div class="col-3">
        <div class="card p-3 shadow-sm">
          <h3 class="h5 mb-3">Register Product</h3>

          <div class="mb-3">
            <label for="txtName" class="form-label">Product Name</label>
            <input
              type="text"
              id="txtName"
              class="form-control"
              placeholder="Enter name"
            />
          </div>

          <div class="mb-3">
            <label for="txtPrice" class="form-label">Price</label>
            <input
              type="number"
              id="txtPrice"
              class="form-control"
              placeholder="Enter price"
            />
          </div>

          <div class="mb-2">
            <button onclick="AddClick()" class="btn btn-primary w-100">
              Add Product
            </button>
          </div>
        </div>
      </div>

      <div class="col-9">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white">
            <h3 class="h5 mb-0">Product Inventory</h3>
          </div>
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Name</th>
                  <th>Price</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
  </body>
</html>
