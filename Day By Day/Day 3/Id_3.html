<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reference</title>
    <script type="text/javascript">
      function bodyload() {
        document.getElementById('pic').src = '../../src/assets/images/home.jpg';
        document.getElementById('btnRegister').value = 'Register';
      }
    </script>
  </head>
  <body onload="bodyload()">
    <div>
      <img id="pic" width="100" height="100" border="1" alt="Home image" />
    </div>
    <div>
      <h2>Register</h2>
      <form id="frmRegister">
        <label for="txtName">User Name:</label>
        <input id="txtName" type="text" placeholder="Enter your username" />
        <input id="btnRegister" type="button" title="Register button" />
      </form>
    </div>
  </body>
</html>
