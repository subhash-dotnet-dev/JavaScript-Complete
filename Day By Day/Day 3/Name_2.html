<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Property Example</title>
    <script type="text/javascript">
        function bodyload() {
            // 1. Target the image using the document.images collection
            document.images["pic"].src = "../../src/assets/images/green_grass.jpg";

            // 2. Target the form button using the document.forms collection
            document.forms["frmRegister"]["btnRegister"].value = "Register";
        }
    </script>
</head>
<body onload="bodyload()">

    <div>
        <img name="pic" width="100" height="100" border="1" alt="Preview Image">
    </div>

    <div>
        <h2>Register</h2>
        <form name="frmRegister">
            <label for="txtName">User Name:</label>
            <input name="txtName" id="txtName" type="text">

            <input name="btnRegister" type="button" value="Register">
        </form>
    </div>

</body>
</html>
