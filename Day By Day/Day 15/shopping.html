<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fakestore | Professional Clean Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../../node_modules/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="../../../node_modules/bootstrap-icons/font/bootstrap-icons.css" />

    <style>
        /* CSS focus on removing all VS Code warnings */
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }

        header {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 0 0 20px 20px;
        }

        /* Fixed: Inline style move to CSS class to solve the warning */
        #catalog {
            height: 550px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
        }

        /* Fixed: Modal inline style move to CSS */
        .custom-modal-content {
            border-radius: 20px;
            border: none;
        }

        .modal-body-scroll {
            max-height: 400px;
            overflow-y: auto;
        }

        .card {
            border: none; border-radius: 18px; transition: 0.3s;
            background: white; width: 230px;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        .card-img-container {
            height: 150px; display: flex; align-items: center; justify-content: center; padding: 15px;
        }
        .card-img-top { max-height: 100%; max-width: 100%; object-fit: contain; }

        .btn-delete { color: #eb4d4b; border: none; background: none; font-size: 1.2rem; }
        #catalog::-webkit-scrollbar { width: 5px; }
        #catalog::-webkit-scrollbar-thumb { background: #a777e3; border-radius: 10px; }
    </style>
  </head>
  <body class="container-fluid" onload="bodyload()">

    <header class="text-white p-3 mb-4 d-flex justify-content-between align-items-center">
      <h3 class="m-0 fw-bold"><i class="bi bi-bag-heart-fill"></i> Fakestore</h3>
      <button onclick="ShowCart()" data-bs-toggle="modal" data-bs-target="#cartModal" class="btn btn-light rounded-pill px-4 fw-bold text-primary shadow-sm border-0">
          <i class="bi bi-cart3"></i> Cart <span id="lblCount" class="badge bg-primary ms-1">0</span>
      </button>
    </header>

    <div class="row px-3">
        <aside class="col-lg-2 mb-4">
            <div class="bg-white p-3 rounded-4 shadow-sm">
                <label for="lstCategories" class="form-label fw-bold text-muted small">FILTER</label>
                <select id="lstCategories" onchange="CategoryChanged()" class="form-select border-0 bg-light py-2" aria-label="Product Category selection">
                </select>
            </div>
        </aside>

        <main class="col-lg-10">
            <div id="catalog">
                </div>
        </main>
    </div>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content custom-modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold">Shopping Cart</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" title="Close modal"></button>
          </div>
          <div class="modal-body modal-body-scroll px-4">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr class="small text-muted">
                  <th>Product</th>
                  <th>Preview</th>
                  <th>Price</th>
                  <th>Remove</th>
                </tr>
              </thead>
              <tbody id="cartBody"></tbody>
            </table>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary rounded-pill px-4">Place Order</button>
          </div>
        </div>
      </div>
    </div>

    <script src="../../../node_modules/jquery/dist/jquery.js"></script>
    <script src="../../../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>

    <script>
        var cartItems = [];

        function GetCartCount() {
            document.getElementById("lblCount").innerHTML = cartItems.length;
        }

        function LoadCategories(){
            fetch("https://fakestoreapi.com/products/categories")
            .then(res => res.json())
            .then(categories => {
                categories.unshift("all");
                categories.map(category => {
                    let option = document.createElement("option");
                    option.text = category.toUpperCase();
                    option.value = category;
                    document.getElementById("lstCategories").appendChild(option);
                })
            })
        }

        function LoadProducts(url){
            const catalog = document.getElementById("catalog");
            catalog.innerHTML = `<div class="w-100 text-center mt-5"><div class="spinner-border text-primary"></div></div>`;

            fetch(url)
            .then(res => res.json())
            .then(products => {
                catalog.innerHTML = "";
                products.map(product => {
                    let div = document.createElement("div");
                    div.className = "card shadow-sm p-3";
                    div.innerHTML = `
                        <div class="card-img-container">
                            <img src="${product.image}" class="card-img-top" alt="${product.title}">
                        </div>
                        <div class="card-body px-0 d-flex flex-column justify-content-between mt-2">
                            <div>
                                <h6 class="text-dark fw-bold text-truncate" title="${product.title}">${product.title}</h6>
                                <p class="small text-muted mb-2">${product.category}</p>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold text-dark">$${product.price}</span>
                                <button onclick="AddToCartClick(${product.id})" class="btn btn-sm btn-primary rounded-pill px-3">Add</button>
                            </div>
                        </div>
                    `;
                    catalog.appendChild(div);
                })
            })
        }

        function bodyload(){
            LoadCategories();
            LoadProducts("https://fakestoreapi.com/products");
            GetCartCount();
        }

        function CategoryChanged(){
            let categoryName = document.getElementById("lstCategories").value;
            LoadProducts(categoryName == "all" ? "https://fakestoreapi.com/products" : `https://fakestoreapi.com/products/category/${categoryName}`);
        }

        function AddToCartClick(id) {
            if (cartItems.find(item => item.id == id)) {
                alert("This item is already in your cart! ❤️");
            } else {
                fetch(`https://fakestoreapi.com/products/${id}`)
                .then(res => res.json())
                .then(product => {
                    cartItems.push(product);
                    GetCartCount();
                });
            }
        }

        function RemoveItem(index) {
            if (confirm("Remove this item?")) {
                cartItems.splice(index, 1);
                GetCartCount();
                ShowCart();
            }
        }

        function ShowCart() {
            let cartBody = document.getElementById("cartBody");
            cartBody.innerHTML = "";
            if(cartItems.length == 0) {
                cartBody.innerHTML = "<tr><td colspan='4' class='text-center py-4 text-muted'>Cart is empty.</td></tr>";
                return;
            }
            cartItems.map((item, index) => {
                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="small text-truncate" style="max-width: 150px;">${item.title}</td>
                    <td><img src="${item.image}" width="40" height="40" alt="product"></td>
                    <td class="fw-bold">$${item.price}</td>
                    <td>
                        <button onclick="RemoveItem(${index})" class="btn-delete" aria-label="Delete item from cart">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </td>
                `;
                cartBody.appendChild(tr);
            });
        }
    </script>
  </body>
</html>
